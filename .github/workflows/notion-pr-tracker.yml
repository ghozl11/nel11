name: N-Labs Notion PR Tracker (100% Free)

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      # خطوة للبحث عن صفحة الطالب في Notion باستخدام الـ GitHub Username بتاعه
      - name: Find Fellow Page in Notion
        id: find_page
        run: |
          GITHUB_USER="${{ github.event.pull_request.user.login }}"
          
          # إرسال طلب لـ Notion للبحث عن الطالب
          RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{\"filter\": {\"property\": \"GitHub username\", \"rich_text\": {\"equals\": \"$GITHUB_USER\"}}}")
          
          PAGE_ID=$(echo $RESPONSE | jq -r '.results[0].id')
          
          if [ "$PAGE_ID" = "null" ] || [ -z "$PAGE_ID" ]; then
            echo "Fellow not found in Notion Directory."
            exit 0
          fi
          
          # سحب الأرقام الحالية للـ PRs من Notion
          CURRENT_SUBMITTED=$(echo $RESPONSE | jq -r '.results[0].properties["PRs submitted"].number // 0')
          CURRENT_APPROVED=$(echo $RESPONSE | jq -r '.results[0].properties["PRs approved"].number // 0')
          
          echo "page_id=$PAGE_ID" >> $GITHUB_OUTPUT
          echo "current_submitted=$CURRENT_SUBMITTED" >> $GITHUB_OUTPUT
          echo "current_approved=$CURRENT_APPROVED" >> $GITHUB_OUTPUT

      # خطوة لتحديث العدادات بناءً على حالة الـ PR (مفتوح ولا مدموج)
      - name: Update Notion Counters
        if: steps.find_page.outputs.page_id != ''
        run: |
          PAGE_ID="${{ steps.find_page.outputs.page_id }}"
          NEW_SUBMITTED=${{ steps.find_page.outputs.current_submitted }}
          NEW_APPROVED=${{ steps.find_page.outputs.current_approved }}
          
          # إذا تم فتح الـ PR الجديد
          if [ "${{ github.event.action }}" = "opened" ] || [ "${{ github.event.action }}" = "reopened" ]; then
            NEW_SUBMITTED=$((NEW_SUBMITTED + 1))
          fi
          
          # إذا تم دمج الـ PR وقبوله بنجاح
          if [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            NEW_APPROVED=$((NEW_APPROVED + 1))
          fi
          
          # إرسال التحديث النهائي لـ Notion
          curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{\"properties\": {\"PRs submitted\": {\"number\": $NEW_SUBMITTED}, \"PRs approved\": {\"number\": $NEW_APPROVED}}}"
