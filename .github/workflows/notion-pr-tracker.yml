name: N-Labs Notion PR Tracker (Advanced Free)

on:
  pull_request:
    types: [opened, closed, reopened]
  pull_request_review:
    types: [submitted]

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Find Fellow Page in Notion
        id: find_page
        run: |
          GITHUB_USER="${{ github.event.pull_request.user.login }}"
          
          RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{\"filter\": {\"property\": \"GitHub username\", \"rich_text\": {\"equals\": \"$GITHUB_USER\"}}}")
          
          PAGE_ID=$(echo $RESPONSE | jq -r '.results[0].id')
          
          if [ "$PAGE_ID" = "null" ] || [ -z "$PAGE_ID" ]; then
            echo "Fellow not found in Notion Directory."
            exit 0
          fi
          
          CURRENT_SUBMITTED=$(echo $RESPONSE | jq -r '.results[0].properties["PRs submitted"].number // 0')
          CURRENT_APPROVED=$(echo $RESPONSE | jq -r '.results[0].properties["PRs approved"].number // 0')
          
          echo "page_id=$PAGE_ID" >> $GITHUB_OUTPUT
          echo "current_submitted=$CURRENT_SUBMITTED" >> $GITHUB_OUTPUT
          echo "current_approved=$CURRENT_APPROVED" >> $GITHUB_OUTPUT

      - name: Update Notion Counters and Append Comments with Timestamps
        if: steps.find_page.outputs.page_id != ''
        run: |
          PAGE_ID="${{ steps.find_page.outputs.page_id }}"
          NEW_SUBMITTED=${{ steps.find_page.outputs.current_submitted }}
          NEW_APPROVED=${{ steps.find_page.outputs.current_approved }}
          NOTE_TEXT=""
          
          # Get current UTC timestamp formatted cleanly
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          # 1. Handle Pull Request events (Fellow Actions)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.action }}" = "opened" ] || [ "${{ github.event.action }}" = "reopened" ]; then
              NEW_SUBMITTED=$((NEW_SUBMITTED + 1))
              PR_BODY="${{ github.event.pull_request.body }}"
              PR_BODY=$(echo "$PR_BODY" | tr -d '"' | tr -d '\n' | tr -d '\r')
              NOTE_TEXT="🗓️ [$TIMESTAMP] 🎯 [Fellow Opened PR] - Description: $PR_BODY"
            fi
            
            # Handle successful code merges
            if [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              NEW_APPROVED=$((NEW_APPROVED + 1))
              NOTE_TEXT="🗓️ [$TIMESTAMP] ✅ [System] - PR successfully merged into Main Pipeline 🎉"
            fi
          fi

          # 2. Handle Review events (Mentor Actions)
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            MENTOR_USER="${{ github.event.review.user.login }}"
            REVIEW_BODY="${{ github.event.review.body }}"
            REVIEW_BODY=$(echo "$REVIEW_BODY" | tr -d '"' | tr -d '\n' | tr -d '\r')
            STATE="${{ github.event.review.state }}"
            
            # Map review state to crisp English log messages
            if [ "$STATE" = "approved" ]; then
              NOTE_TEXT="🗓️ [$TIMESTAMP] 👍 [Mentor $MENTOR_USER Approved Code] - Comment: $REVIEW_BODY"
            elif [ "$STATE" = "changes_requested" ]; then
              NOTE_TEXT="🗓️ [$TIMESTAMP] ⚠️ [Mentor $MENTOR_USER Requested Changes] - Comment: $REVIEW_BODY"
            else
              NOTE_TEXT="🗓️ [$TIMESTAMP] 💬 [Mentor $MENTOR_USER Added General Comment] - Comment: $REVIEW_BODY"
            fi
          fi

          # Update numerical property metrics in Notion
          curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{\"properties\": {\"PRs submitted\": {\"number\": $NEW_SUBMITTED}, \"PRs approved\": {\"number\": $NEW_APPROVED}}}"

          # Append the clean English log string to the fellow's page content body
          if [ ! -z "$NOTE_TEXT" ]; then
            curl -s -X PATCH "https://api.notion.com/v1/blocks/$PAGE_ID/children" \
              -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{\"children\": [{\"object\": \"block\", \"type\": \"bulleted_list_item\", \"bulleted_list_item\": {\"rich_text\": [{\"type\": \"text\", \"text\": {\"content\": \"$NOTE_TEXT\"}}]}}]}"
          fi
