name: N-Labs Q&A Engine (Zero OpEx)

on:
  schedule:
    - cron: '*/15 * * * *' # يعمل أوتوماتيكياً كل 15 دقيقة
  workflow_dispatch: # زر للتشغيل اليدوي للاختبار

jobs:
  sync-discord-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install requests
        
      - name: Create Sync Script
        run: |
          cat << 'EOF' > qa_engine.py
          import os, requests

          NOTION_TOKEN = os.getenv("NOTION_TOKEN")
          QA_DB_ID = os.getenv("NOTION_QA_DB_ID")
          FELLOWS_DB_ID = os.getenv("NOTION_DATABASE_ID")
          DISCORD_TOKEN = os.getenv("DISCORD_TOKEN")

          NOTION_HEADERS = {
              "Authorization": f"Bearer {NOTION_TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json"
          }
          DISCORD_HEADERS = {
              "Authorization": f"Bot {DISCORD_TOKEN}",
              "Content-Type": "application/json"
          }

          def sync_operations():
              print("Initiating N-Labs Two-Way Sync...")
              
              # 1. إرسال ردود الـ Mentors من Notion إلى Discord
              payload = {"filter": {"property": "Send Reply", "checkbox": {"equals": True}}}
              res = requests.post(f"https://api.notion.com/v1/databases/{QA_DB_ID}/query", headers=NOTION_HEADERS, json=payload).json()
              
              for page in res.get("results", []):
                  page_id = page["id"]
                  props = page["properties"]
                  
                  discord_uid_obj = props.get("Discord User ID", {}).get("rich_text", [])
                  reply_obj = props.get("Mentor Reply", {}).get("rich_text", [])
                  
                  if discord_uid_obj and reply_obj:
                      uid = discord_uid_obj[0]["plain_text"]
                      reply = reply_obj[0]["plain_text"]
                      
                      # فتح قناة خاصة مع الطالب وإرسال الرد
                      dm_res = requests.post("https://discord.com/api/v10/users/@me/channels", headers=DISCORD_HEADERS, json={"recipient_id": uid})
                      if dm_res.status_code == 200:
                          channel_id = dm_res.json()["id"]
                          msg = f"✨ **N-Labs Mentor Reply:**\n\n{reply}"
                          requests.post(f"https://discord.com/api/v10/channels/{channel_id}/messages", headers=DISCORD_HEADERS, json={"content": msg})
                          
                          # إزالة علامة الصح في Notion لمنع التكرار
                          requests.patch(f"https://api.notion.com/v1/pages/{page_id}", headers=NOTION_HEADERS, json={"properties": {"Send Reply": {"checkbox": False}}})

              # 2. سحب الأسئلة الجديدة من Discord إلى Notion
              f_res = requests.post(f"https://api.notion.com/v1/databases/{FELLOWS_DB_ID}/query", headers=NOTION_HEADERS).json()
              for p in f_res.get("results", []):
                  uid_obj = p["properties"].get("Discord User ID", {}).get("rich_text", [])
                  if not uid_obj: continue
                  
                  uid = uid_obj[0]["plain_text"].strip()
                  # الوصول لرسائل الطالب
                  dm_res = requests.post("https://discord.com/api/v10/users/@me/channels", headers=DISCORD_HEADERS, json={"recipient_id": uid})
                  if dm_res.status_code != 200: continue
                  
                  channel_id = dm_res.json()["id"]
                  msgs = requests.get(f"https://discord.com/api/v10/channels/{channel_id}/messages?limit=5", headers=DISCORD_HEADERS).json()
                  
                  if isinstance(msgs, list):
                      for m in msgs:
                          # التأكد أن الرسالة من الطالب وليس البوت
                          if m.get("author", {}).get("id") == uid:
                              msg_id = m["id"]
                              content = m["content"]
                              
                              # التحقق من عدم وجود الرسالة مسبقاً في Notion
                              q_payload = {"filter": {"property": "Message ID", "rich_text": {"equals": msg_id}}}
                              q_res = requests.post(f"https://api.notion.com/v1/databases/{QA_DB_ID}/query", headers=NOTION_HEADERS, json=q_payload).json()
                              
                              if not q_res.get("results"):
                                  # إنشاء تذكرة جديدة
                                  new_page = {
                                      "parent": {"database_id": QA_DB_ID},
                                      "properties": {
                                          "Question Title": {"title": [{"text": {"content": f"Ticket from {uid}"}}]},
                                          "Question Details": {"rich_text": [{"text": {"content": content}}]},
                                          "Discord User ID": {"rich_text": [{"text": {"content": uid}}]},
                                          "Message ID": {"rich_text": [{"text": {"content": msg_id}}]}
                                      }
                                  }
                                  requests.post("https://api.notion.com/v1/pages", headers=NOTION_HEADERS, json=new_page)

          if __name__ == "__main__":
              sync_operations()
          EOF
          
      - name: Run Engine
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_QA_DB_ID: ${{ secrets.NOTION_QA_DB_ID }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }} # جدول المتدربين
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python qa_engine.py
