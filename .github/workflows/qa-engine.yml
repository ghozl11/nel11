name: N-Labs Q&A Engine (Verbose Debug)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-discord-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install requests
        
      - name: Create Sync Script
        run: |
          cat << 'EOF' > qa_engine.py
          import os, requests

          NOTION_TOKEN = os.getenv("NOTION_TOKEN")
          QA_DB_ID = os.getenv("NOTION_QA_DB_ID")
          FELLOWS_DB_ID = os.getenv("NOTION_DATABASE_ID")
          DISCORD_TOKEN = os.getenv("DISCORD_TOKEN")

          NOTION_HEADERS = {
              "Authorization": f"Bearer {NOTION_TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json"
          }
          DISCORD_HEADERS = {
              "Authorization": f"Bot {DISCORD_TOKEN}",
              "Content-Type": "application/json"
          }

          def sync_operations():
              print("--- STARTING N-LABS SYNC ENGINE ---")
              
              # 1. فحص الاتصال بجدول المتدربين الأساسي
              print(f"Connecting to Fellows Database ID: {FELLOWS_DB_ID}...")
              f_res = requests.post(f"https://api.notion.com/v1/databases/{FELLOWS_DB_ID}/query", headers=NOTION_HEADERS)
              
              if f_res.status_code != 200:
                  print(f"❌ NOTION ERROR: Cannot access Fellows Database. Status: {f_res.status_code}")
                  print(f"Response: {f_res.text}")
                  return
              
              results = f_res.json().get("results", [])
              print(f"✅ Notion Connected. Found {len(results)} records in Fellows Database.")
              
              for p in results:
                  props = p.get("properties", {})
                  # محاولة جلب اسم الطالب للتوثيق في الـ Logs
                  student_name = "Unknown"
                  for prop_name in ["Name", "الاسم", "Name ", "GitHub username"]:
                      if prop_name in props and props[prop_name].get("title"):
                          student_name = props[prop_name]["title"][0]["plain_text"]
                          break
                      elif prop_name in props and props[prop_name].get("rich_text"):
                          if props[prop_name]["rich_text"]:
                              student_name = props[prop_name]["rich_text"][0]["plain_text"]
                              break

                  uid_obj = props.get("Discord User ID", {}).get("rich_text", [])
                  if not uid_obj:
                      print(f"⚠️ Skipping student [{student_name}]: 'Discord User ID' column is empty.")
                      continue
                  
                  uid = uid_obj[0]["plain_text"].strip()
                  print(f"Processing student [{student_name}] with Discord UID: {uid}...")
                  
                  # 2. محاولة فتح شات خاص عبر ديسكورد
                  dm_res = requests.post("https://discord.com/api/v10/users/@me/channels", headers=DISCORD_HEADERS, json={"recipient_id": uid})
                  
                  if dm_res.status_code != 200:
                      print(f"❌ DISCORD ERROR: Cannot open DM with UID {uid}. Status: {dm_res.status_code}")
                      print(f"Response: {dm_res.text}")
                      continue
                  
                  channel_id = dm_res.json()["id"]
                  print(f"✅ DM Channel verified (ID: {channel_id}). Fetching recent messages...")
                  
                  # 3. جلب الرسائل
                  msgs_res = requests.get(f"https://discord.com/api/v10/channels/{channel_id}/messages?limit=5", headers=DISCORD_HEADERS)
                  if msgs_res.status_code != 200:
                      print(f"❌ DISCORD ERROR: Cannot fetch messages. Status: {msgs_res.status_code}")
                      continue
                      
                  msgs = msgs_res.json()
                  print(f"Found {len(msgs)} messages in DM history.")
                  
                  if isinstance(msgs, list):
                      for m in msgs:
                          if m.get("author", {}).get("id") == uid:
                              msg_id = m["id"]
                              content = m["content"]
                              print(f"📩 Found question from student: '{content}'")
                              
                              # التحقق من عدم التكرار في جدول الأسئلة
                              q_payload = {"filter": {"property": "Message ID", "rich_text": {"equals": msg_id}}}
                              q_res = requests.post(f"https://api.notion.com/v1/databases/{QA_DB_ID}/query", headers=NOTION_HEADERS, json=q_payload).json()
                              
                              if not q_res.get("results"):
                                  print("✨ This is a new ticket! Creating page in Notion...")
                                  new_page = {
                                      "parent": {"database_id": QA_DB_ID},
                                      "properties": {
                                          "Question Title": {"title": [{"text": {"content": f"Ticket from {student_name}"}}]},
                                          "Question Details": {"rich_text": [{"text": {"content": content}}]},
                                          "Discord User ID": {"rich_text": [{"text": {"content": uid}}]},
                                          "Message ID": {"rich_text": [{"text": {"content": msg_id}}]}
                                      }
                                  }
                                  create_res = requests.post("https://api.notion.com/v1/pages", headers=NOTION_HEADERS, json=new_page)
                                  print(f"Notion Page Creation Status: {create_res.status_code}")
                              else:
                                  print("⏭️ Ticket already exists in Notion. Skipping.")

              print("--- SYNC ENGINE PROCESS COMPLETED ---")

          if __name__ == "__main__":
              sync_operations()
          EOF
          
      - name: Run Engine
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_QA_DB_ID: ${{ secrets.NOTION_QA_DB_ID }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python qa_engine.py
