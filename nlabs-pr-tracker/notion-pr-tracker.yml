name: N-Labs Notion PR Tracker

on:
  pull_request:
    types: [opened, closed, reopened, synchronize]

jobs:
  notify-notion:
    name: Sync PR status to Notion
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Determine PR event type
        id: event
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            echo "status=submitted" >> $GITHUB_OUTPUT
            echo "label=PR Opened" >> $GITHUB_OUTPUT

          elif [ "${{ github.event.action }}" = "closed" ] && \
               [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "status=approved" >> $GITHUB_OUTPUT
            echo "label=PR Merged" >> $GITHUB_OUTPUT

          elif [ "${{ github.event.action }}" = "closed" ] && \
               [ "${{ github.event.pull_request.merged }}" = "false" ]; then
            echo "status=rejected" >> $GITHUB_OUTPUT
            echo "label=PR Closed (not merged)" >> $GITHUB_OUTPUT

          elif [ "${{ github.event.action }}" = "synchronize" ]; then
            echo "status=updated" >> $GITHUB_OUTPUT
            echo "label=PR Updated" >> $GITHUB_OUTPUT

          elif [ "${{ github.event.action }}" = "reopened" ]; then
            echo "status=submitted" >> $GITHUB_OUTPUT
            echo "label=PR Reopened" >> $GITHUB_OUTPUT
          fi

      - name: Send PR event to Notion endpoint
        env:
          WEBHOOK_SECRET: ${{ secrets.NLABS_WEBHOOK_SECRET }}
          ENDPOINT_URL:   ${{ secrets.NLABS_ENDPOINT_URL }}
        run: |
          PAYLOAD=$(jq -n \
            --arg status        "${{ steps.event.outputs.status }}" \
            --arg label         "${{ steps.event.outputs.label }}" \
            --arg pr_number     "${{ github.event.pull_request.number }}" \
            --arg pr_title      "${{ github.event.pull_request.title }}" \
            --arg pr_url        "${{ github.event.pull_request.html_url }}" \
            --arg author        "${{ github.event.pull_request.user.login }}" \
            --arg repo          "${{ github.repository }}" \
            --arg branch        "${{ github.event.pull_request.head.ref }}" \
            --arg base_branch   "${{ github.event.pull_request.base.ref }}" \
            --arg merged        "${{ github.event.pull_request.merged }}" \
            --arg commits       "${{ github.event.pull_request.commits }}" \
            --arg additions     "${{ github.event.pull_request.additions }}" \
            --arg deletions     "${{ github.event.pull_request.deletions }}" \
            --arg event_time    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              status:       $status,
              label:        $label,
              pr_number:    ($pr_number | tonumber),
              pr_title:     $pr_title,
              pr_url:       $pr_url,
              author:       $author,
              repo:         $repo,
              branch:       $branch,
              base_branch:  $base_branch,
              merged:       ($merged == "true"),
              commits:      ($commits | tonumber),
              additions:    ($additions | tonumber),
              deletions:    ($deletions | tonumber),
              event_time:   $event_time
            }')

          SIGNATURE=$(echo -n "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print $2}')

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "$ENDPOINT_URL/webhook/github-pr" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "X-GitHub-Event: pull_request" \
            -d "$PAYLOAD")

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/response.json

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Endpoint returned $HTTP_CODE — failing step"
            exit 1
          fi

      - name: Log result
        if: always()
        run: |
          echo "PR #${{ github.event.pull_request.number }} — \
          ${{ steps.event.outputs.label }} — \
          author: ${{ github.event.pull_request.user.login }}"
